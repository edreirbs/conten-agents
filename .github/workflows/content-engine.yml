name: Content Engine

concurrency:
  group: content-engine-main
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "15 14 * * 1,3,5"

permissions:
  contents: write

jobs:
  publish-content:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run content pipeline
        env:
          PYTHONUTF8: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_DISCOVERY: ${{ secrets.OPENAI_MODEL_DISCOVERY }}
          OPENAI_MODEL_WRITING: ${{ secrets.OPENAI_MODEL_WRITING }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORGANIZATION_URN: ${{ secrets.LINKEDIN_ORGANIZATION_URN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_REDIRECT_URI: ${{ secrets.LINKEDIN_REDIRECT_URI }}
          LINKEDIN_VERSION: ${{ secrets.LINKEDIN_VERSION }}
        run: python scripts/run_pipeline.py

      - name: Commit generated content
        run: |
          git config user.name "content-agent[bot]"
          git config user.email "content-agent[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: publish automated content"
          git push
